<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>猪猪妈妈 · 华中师范大学生活指南</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <style>
    :root {
      --primary: #E85D75;
      --primary-light: #FFE8EC;
      --secondary: #3A86FF;
      --bg: #F5F6FA;
      --card: #FFFFFF;
      --text: #1A1A2E;
      --text-secondary: #6B7280;
      --border: #E5E7EB;
      --shadow: 0 2px 12px rgba(0,0,0,0.08);
      --nav-h: 60px;
      --header-h: 52px;
      --radius: 12px;
      --font-base: 14px;
      --safe-bottom: env(safe-area-inset-bottom, 0px);
    }
    [data-theme="dark"] {
      --primary: #FF7B93;
      --primary-light: #3D2028;
      --secondary: #6BA3FF;
      --bg: #121218;
      --card: #1E1E28;
      --text: #F0F0F5;
      --text-secondary: #9CA3AF;
      --border: #2D2D3A;
      --shadow: 0 2px 12px rgba(0,0,0,0.3);
    }
    [data-font="small"] { --font-base: 13px; }
    [data-font="large"] { --font-base: 16px; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: var(--font-base); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background: var(--bg); color: var(--text);
      max-width: 428px; min-width: 375px; margin: 0 auto;
      min-height: 100vh; overflow-x: hidden;
    }
    .app { padding-bottom: calc(var(--nav-h) + var(--safe-bottom)); min-height: 100vh; }
    .hidden { display: none !important; }
    /* Header */
    .page-header {
      position: sticky; top: 0; z-index: 100;
      background: var(--card); border-bottom: 1px solid var(--border);
      height: var(--header-h); display: flex; align-items: center;
      padding: 0 16px; gap: 12px;
    }
    .page-header h1 { font-size: 1.1rem; font-weight: 700; flex: 1; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .back-btn { background: none; border: none; color: var(--primary); font-size: 1.1rem; cursor: pointer; padding: 8px; }
    /* Search */
    .search-bar {
      display: flex; align-items: center; gap: 8px;
      background: var(--card); border: 1px solid var(--border);
      border-radius: 24px; padding: 8px 14px; margin: 12px 16px;
    }
    .search-bar input { flex: 1; border: none; background: transparent; color: var(--text); font-size: 0.95rem; outline: none; }
    .search-bar i { color: var(--text-secondary); }
    /* Section Grid */
    .home-banner { padding: 0 16px 8px; color: var(--text-secondary); font-size: 0.85rem; }
    .section-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 16px 16px; }
    .section-card {
      background: var(--card); border-radius: var(--radius); padding: 14px 8px;
      text-align: center; cursor: pointer; box-shadow: var(--shadow);
      transition: transform 0.15s; border: 1px solid var(--border);
    }
    .section-card:active { transform: scale(0.96); }
    .section-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; margin: 0 auto 8px; font-size: 1.2rem; color: #fff; }
    .section-card h3 { font-size: 0.8rem; font-weight: 600; line-height: 1.3; }
    .section-card p { font-size: 0.7rem; color: var(--text-secondary); margin-top: 4px; }
    /* Search Results */
    .search-results { padding: 0 16px 16px; }
    .result-item {
      background: var(--card); border-radius: var(--radius); padding: 12px;
      margin-bottom: 8px; cursor: pointer; border: 1px solid var(--border);
    }
    .result-type { font-size: 0.75rem; color: var(--primary); font-weight: 600; }
    .result-title { font-weight: 600; margin: 4px 0; }
    .result-desc { font-size: 0.85rem; color: var(--text-secondary); }
    /* Section Detail */
    .sub-tabs { display: flex; border-bottom: 1px solid var(--border); background: var(--card); }
    .sub-tab { flex: 1; text-align: center; padding: 12px; cursor: pointer; color: var(--text-secondary); font-weight: 500; border-bottom: 2px solid transparent; }
    .sub-tab.active { color: var(--primary); border-bottom-color: var(--primary); font-weight: 600; }
    .item-list { padding: 12px 16px; }
    .item-card {
      background: var(--card); border-radius: var(--radius); padding: 14px;
      margin-bottom: 10px; cursor: pointer; border: 1px solid var(--border);
      transition: background 0.15s;
    }
    .item-card:active { background: var(--primary-light); }
    .item-title { font-weight: 600; margin-bottom: 6px; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .tag-campus { background: #DBEAFE; color: #1D4ED8; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    .tag-exp { background: #FEF3C7; color: #B45309; font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: 600; }
    [data-theme="dark"] .tag-campus { background: #1E3A5F; color: #93C5FD; }
    [data-theme="dark"] .tag-exp { background: #3D2E0A; color: #FCD34D; }
    .item-desc { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
    .item-step { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
    /* Community */
    .tag-filter { display: flex; gap: 8px; padding: 8px 16px; overflow-x: auto; scrollbar-width: none; background: var(--card); border-bottom: 1px solid var(--border); }
    .tag-filter::-webkit-scrollbar { display: none; }
    .filter-tag { flex-shrink: 0; padding: 6px 14px; border-radius: 16px; font-size: 0.8rem; cursor: pointer; background: var(--bg); color: var(--text-secondary); border: 1px solid var(--border); }
    .filter-tag.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .post-list { padding: 12px 16px; }
    .post-card { background: var(--card); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; border: 1px solid var(--border); position: relative; }
    .post-header { display: flex; justify-content: space-between; align-items: flex-start; }
    .post-type { font-size: 0.75rem; padding: 2px 8px; border-radius: 4px; font-weight: 600; }
    .post-type.help { background: #FEE2E2; color: #DC2626; }
    .post-type.share { background: #D1FAE5; color: #059669; }
    .post-type.trade { background: #DBEAFE; color: #2563EB; }
    [data-theme="dark"] .post-type.help { background: #3D1515; color: #FCA5A5; }
    [data-theme="dark"] .post-type.share { background: #0D3321; color: #6EE7B7; }
    [data-theme="dark"] .post-type.trade { background: #1E3A5F; color: #93C5FD; }
    .post-menu { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 4px 8px; font-size: 1rem; }
    .post-title { font-weight: 600; margin: 8px 0 6px; cursor: pointer; }
    .post-content { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .post-tags { display: flex; gap: 6px; flex-wrap: wrap; margin: 8px 0; }
    .post-tag { font-size: 0.7rem; padding: 2px 8px; border-radius: 10px; background: var(--bg); color: var(--text-secondary); }
    .post-meta { display: flex; justify-content: space-between; font-size: 0.75rem; color: var(--text-secondary); margin-top: 8px; }
    .post-actions { display: flex; gap: 4px; margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px; flex-wrap: wrap; }
    .action-btn {
      flex: 1; min-width: 60px; display: flex; align-items: center; justify-content: center; gap: 4px;
      background: none; border: none; color: var(--text-secondary); font-size: 0.75rem;
      cursor: pointer; padding: 6px; border-radius: 8px;
    }
    .action-btn:active, .action-btn.active { color: var(--primary); background: var(--primary-light); }
    .fab {
      position: fixed; bottom: calc(var(--nav-h) + 16px + var(--safe-bottom));
      right: 20px; width: 52px; height: 52px; border-radius: 50%;
      background: var(--primary); color: #fff; border: none; font-size: 1.3rem;
      box-shadow: 0 4px 16px rgba(232,93,117,0.4); cursor: pointer; z-index: 50;
    }
    .fab:active { transform: scale(0.95); }
    /* Profile */
    .profile-header { background: linear-gradient(135deg, var(--primary), #FF9A8B); padding: 24px 16px; color: #fff; }
    .profile-info { display: flex; align-items: center; gap: 14px; }
    .avatar { width: 64px; height: 64px; border-radius: 50%; background: rgba(255,255,255,0.3); display: flex; align-items: center; justify-content: center; font-size: 2rem; border: 2px solid rgba(255,255,255,0.5); }
    .profile-name { font-size: 1.2rem; font-weight: 700; cursor: pointer; }
    .profile-id { font-size: 0.8rem; opacity: 0.85; margin-top: 4px; }
    .menu-list { padding: 12px 16px; }
    .menu-group { background: var(--card); border-radius: var(--radius); margin-bottom: 12px; overflow: hidden; border: 1px solid var(--border); }
    .menu-item {
      display: flex; align-items: center; padding: 14px 16px; cursor: pointer;
      border-bottom: 1px solid var(--border); gap: 12px;
    }
    .menu-item:last-child { border-bottom: none; }
    .menu-item:active { background: var(--primary-light); }
    .menu-item i { width: 20px; color: var(--primary); text-align: center; }
    .menu-item span { flex: 1; }
    .menu-item .arrow { color: var(--text-secondary); font-size: 0.8rem; }
    .menu-badge { background: var(--primary); color: #fff; font-size: 0.7rem; padding: 1px 6px; border-radius: 10px; }
    /* Bottom Nav */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 428px; height: calc(var(--nav-h) + var(--safe-bottom));
      background: var(--card); border-top: 1px solid var(--border);
      display: flex; z-index: 200; padding-bottom: var(--safe-bottom);
    }
    .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px; cursor: pointer; color: var(--text-secondary); border: none; background: none; font-size: 0.7rem; padding: 6px; }
    .nav-item i { font-size: 1.2rem; }
    .nav-item.active { color: var(--primary); }
    /* Modal */
    .modal-overlay {
      position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 300;
      display: flex; align-items: flex-end; justify-content: center;
    }
    .modal-box {
      background: var(--card); width: 100%; max-width: 428px;
      max-height: 85vh; border-radius: 16px 16px 0 0;
      overflow-y: auto; animation: slideUp 0.25s ease;
    }
    @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 16px; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: var(--card); z-index: 1; }
    .modal-header h2 { font-size: 1rem; font-weight: 700; }
    .modal-close { background: none; border: none; font-size: 1.2rem; color: var(--text-secondary); cursor: pointer; padding: 4px; }
    .modal-body { padding: 16px; line-height: 1.7; }
    .modal-body .info-row { display: flex; margin: 8px 0; font-size: 0.9rem; }
    .modal-body .info-label { width: 50px; color: var(--text-secondary); flex-shrink: 0; }
    /* Form */
    .form-group { margin-bottom: 14px; }
    .form-group label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select {
      width: 100%; padding: 10px 12px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.9rem;
    }
    .form-group textarea { min-height: 100px; resize: vertical; }
    .tag-select { display: flex; flex-wrap: wrap; gap: 8px; }
    .tag-option { padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border); cursor: pointer; font-size: 0.8rem; }
    .tag-option.selected { background: var(--primary); color: #fff; border-color: var(--primary); }
    .btn-primary {
      width: 100%; padding: 12px; background: var(--primary); color: #fff;
      border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer;
    }
    .btn-primary:active { opacity: 0.85; }
    .btn-secondary { width: 100%; padding: 12px; background: var(--bg); color: var(--text); border: 1px solid var(--border); border-radius: 10px; font-size: 0.9rem; cursor: pointer; margin-top: 8px; }
    .img-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
    .img-preview img { width: 72px; height: 72px; object-fit: cover; border-radius: 8px; }
    /* Settings */
    .setting-item { display: flex; align-items: center; justify-content: space-between; padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .setting-item:last-child { border-bottom: none; }
    .toggle { width: 44px; height: 24px; background: var(--border); border-radius: 12px; position: relative; cursor: pointer; transition: background 0.2s; border: none; }
    .toggle.on { background: var(--primary); }
    .toggle::after { content: ''; position: absolute; width: 20px; height: 20px; background: #fff; border-radius: 50%; top: 2px; left: 2px; transition: transform 0.2s; }
    .toggle.on::after { transform: translateX(20px); }
    .setting-select { padding: 4px 8px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); font-size: 0.85rem; }
    /* Comments */
    .comment-item { padding: 10px 0; border-bottom: 1px solid var(--border); }
    .comment-header-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .comment-author { font-weight: 600; font-size: 0.85rem; }
    .comment-reply-btn { margin-left: auto; background: none; border: none; color: var(--primary); font-size: 0.75rem; cursor: pointer; padding: 2px 6px; }
    .comment-text { font-size: 0.85rem; margin-top: 4px; line-height: 1.5; }
    .comment-time { font-size: 0.7rem; color: var(--text-secondary); }
    .reply-form { margin-top: 8px; display: flex; flex-direction: column; gap: 6px; }
    .reply-form.hidden { display: none; }
    .reply-form input, .reply-form textarea {
      width: 100%; padding: 8px 10px; border: 1px solid var(--border);
      border-radius: 8px; background: var(--bg); color: var(--text); font-size: 0.85rem;
    }
    .reply-form textarea { min-height: 64px; resize: vertical; }
    .reply-form button {
      align-self: flex-end; padding: 6px 14px; background: var(--primary); color: #fff;
      border: none; border-radius: 8px; cursor: pointer; font-size: 0.85rem;
    }
    .comment-input-row { display: flex; gap: 8px; margin-top: 12px; }
    .comment-input-row input { flex: 1; padding: 8px 12px; border: 1px solid var(--border); border-radius: 20px; background: var(--bg); color: var(--text); }
    .comment-input-row button { padding: 8px 16px; background: var(--primary); color: #fff; border: none; border-radius: 20px; cursor: pointer; font-size: 0.85rem; }
    /* Toast */
    .toast {
      position: fixed; top: 60px; left: 50%; transform: translateX(-50%);
      background: rgba(0,0,0,0.8); color: #fff; padding: 10px 20px;
      border-radius: 20px; font-size: 0.85rem; z-index: 999; pointer-events: none;
      animation: fadeInOut 2s ease forwards;
    }
    @keyframes fadeInOut { 0%,100% { opacity: 0; } 10%,80% { opacity: 1; } }
    /* Sub pages */
    .sub-page { min-height: calc(100vh - var(--nav-h)); }
    .empty-state { text-align: center; padding: 40px 16px; color: var(--text-secondary); }
    .empty-state i { font-size: 2.5rem; margin-bottom: 12px; opacity: 0.4; }
    .list-entry { padding: 12px 16px; border-bottom: 1px solid var(--border); cursor: pointer; }
    .list-entry:active { background: var(--primary-light); }
    .list-entry-title { font-weight: 600; }
    .list-entry-desc { font-size: 0.85rem; color: var(--text-secondary); margin-top: 4px; }
    .faq-item { padding: 14px 16px; border-bottom: 1px solid var(--border); }
    .faq-q { font-weight: 600; margin-bottom: 6px; }
    .faq-a { font-size: 0.85rem; color: var(--text-secondary); line-height: 1.5; }
    .about-info { text-align: center; padding: 32px 16px; }
    .about-logo { font-size: 3rem; margin-bottom: 12px; }
    .about-version { color: var(--text-secondary); margin-top: 8px; }
    .text-content { padding: 16px; line-height: 1.8; font-size: 0.9rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="app" id="app">
    <!-- 主页 Tab -->
    <div id="tab-home" class="tab-panel">
      <div id="home-main">
        <div class="page-header"><h1>🐷 猪猪妈妈</h1></div>
        <div class="search-bar">
          <i class="fas fa-search"></i>
          <input type="text" id="searchInput" placeholder="搜索校园生活指南…" autocomplete="off">
          <button id="clearSearch" class="hidden" style="background:none;border:none;color:var(--text-secondary);cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div class="home-banner">校园生活全能指南 · 武汉 · 华中师范大学</div>
        <div class="section-grid" id="sectionGrid"></div>
        <div class="search-results hidden" id="searchResults"></div>
      </div>
      <div id="section-detail" class="sub-page hidden">
        <div class="page-header">
          <button class="back-btn" onclick="App.goBackSection()"><i class="fas fa-arrow-left"></i></button>
          <h1 id="sectionDetailTitle">板块详情</h1>
        </div>
        <div class="sub-tabs" id="sectionSubTabs"></div>
        <div class="item-list" id="sectionItemList"></div>
      </div>
    </div>

    <!-- 社群 Tab -->
    <div id="tab-community" class="tab-panel hidden">
      <div class="page-header"><h1>社群</h1></div>
      <div class="tag-filter" id="tagFilter"></div>
      <div class="post-list" id="postList"></div>
      <button class="fab" id="fabPublish" title="发布"><i class="fas fa-plus"></i></button>
    </div>

    <!-- 我的 Tab -->
    <div id="tab-profile" class="tab-panel hidden">
      <div id="profile-main">
        <div class="profile-header">
          <div class="profile-info">
            <div class="avatar">🐷</div>
            <div>
              <div class="profile-name" id="profileNickname" onclick="App.editNickname()">猪猪妈妈</div>
              <div class="profile-id" id="profileId">ID: user_001</div>
            </div>
          </div>
        </div>
        <div class="menu-list" id="profileMenu"></div>
      </div>
      <div id="profile-sub" class="sub-page hidden"></div>
    </div>
  </div>

  <!-- 底部导航 -->
  <nav class="bottom-nav">
    <button class="nav-item active" data-tab="home"><i class="fas fa-home"></i><span>主页</span></button>
    <button class="nav-item" data-tab="community"><i class="fas fa-users"></i><span>社群</span></button>
    <button class="nav-item" data-tab="profile"><i class="fas fa-user"></i><span>我的</span></button>
  </nav>

  <!-- 模态框容器 -->
  <div id="modalContainer"></div>

  <script>
/* ========== 猪猪妈妈 · 数据层（硬编码模拟数据库） ========== */

const SECTIONS = [
  { id: 'health', title: '医疗与健康', icon: '🏥', color: '#FF6B6B', description: '校医院、医保、就医指南' },
  { id: 'transport', title: '出行与交通', icon: '🚌', color: '#4ECDC4', description: '地铁、公交、共享单车' },
  { id: 'life', title: '生活与服务', icon: '🏠', color: '#FFE66D', description: '水电网、快递、洗衣' },
  { id: 'finance', title: '消费与理财', icon: '💰', color: '#95E1D3', description: '银行卡、优惠、记账' },
  { id: 'certificate', title: '证件办理', icon: '📄', color: '#F38181', description: '身份证、护照、居住证' },
  { id: 'career', title: '职场与社保', icon: '💼', color: '#AA96DA', description: '实习、社保、公积金' },
  { id: 'legal', title: '法律与安全', icon: '🛡️', color: '#FCBAD3', description: '维权、防骗、安全' },
  { id: 'social', title: '社交与人际', icon: '👥', color: '#A8D8EA', description: '社团、交友、活动' },
  { id: 'study', title: '学习', icon: '📚', color: '#3A86FF', description: '图书馆、选课、考研' }
];

const SECTION_MAP = Object.fromEntries(SECTIONS.map(s => [s.id, s]));

const BASIC_ARTICLES = (() => {
  const templates = {
    health: {
      titles: ['大学生医保报销流程', '武汉市就医指南', '常见药品购买', '心理健康咨询', '疫苗接种须知'],
      steps: [
        ['携带学生证和医保卡', '到校医院挂号', '医生诊断开药', '窗口结算报销'],
        ['选择定点医院', '预约挂号', '携带身份证就医', '保留发票凭证'],
        ['校医院药房购药', '校外连锁药店', '线上问诊购药', '注意处方药规定'],
        ['预约心理咨询', '填写心理测评', '与咨询师面谈', '定期跟进'],
        ['关注学校通知', '预约接种时间', '携带证件', '留观30分钟']
      ]
    },
    transport: {
      titles: ['武汉地铁乘坐指南', '公交卡办理', '共享单车使用', '机场/火车站出行', '校园班车信息'],
      steps: [

  <script>
/* ========== 猪猪妈妈 · 应用逻辑层 ========== */

const App = (() => {
  const USER_ID = 'user_001';
  const STORAGE_KEY = 'pigmom_app_state';

  let state = loadState();
  let currentTab = 'home';
  let currentSection = null;
  let currentSectionTab = 'basic';
  let currentTagFilter = '全部';
  let profileSubPage = null;
  let blockedUsers = new Set(state.blockedUsers || []);
  let blockedPosts = new Set(state.blockedPosts || []);

  function stripResolvedFromPosts(posts) {
    return posts.map(({ resolved, ...rest }) => rest);
  }

  function normalizeComment(c) {
    const parentId = c.parentId ?? c.replyToId ?? null;
    const { replyToId, replyToName, replies, ...rest } = c;
    return { ...rest, parentId };
  }

  function normalizeComments(comments) {
    return comments.map(normalizeComment);
  }

  function buildCommentTree(flat) {
    const map = new Map();
    flat.forEach(c => map.set(c.id, { ...c, replies: [] }));
    const roots = [];
    flat.forEach(c => {
      const node = map.get(c.id);
      if (!c.parentId) roots.push(node);
      else {
        const parent = map.get(c.parentId);
        if (parent) parent.replies.push(node);
        else roots.push(node);
      }
    });
    const sort = list => {
      list.sort((a, b) => new Date(a.createdAt) - new Date(b.createdAt));
      list.forEach(n => sort(n.replies));
    };
    sort(roots);
    return roots;
  }

  function getCommentDepth(flat, commentId) {
    const map = new Map(flat.map(c => [c.id, c]));
    let depth = 0;
    let cur = map.get(commentId);
    while (cur) {
      depth++;
      cur = cur.parentId ? map.get(cur.parentId) : null;
    }
    return depth;
  }

  function countAllComments(tree) {
    return tree.reduce((sum, c) => sum + 1 + countAllComments(c.replies), 0);
  }

  function defaultState() {
    return {
      nickname: '猪猪妈妈',
      posts: JSON.parse(JSON.stringify(POSTS)),
      comments: JSON.parse(JSON.stringify(COMMENTS)),
      notifications: JSON.parse(JSON.stringify(NOTIFICATIONS)),
      browseHistory: [],
      favorites: { articles: [], posts: [], experiences: [] },
      likedPosts: [],
      myPosts: [],
      drafts: [],
      settings: {
        pushEnabled: true,
        darkMode: false,
        fontSize: 'medium',
        recordHistory: true,
        commentPermission: 'all',
        profileVisibility: 'all'
      },
      blockedUsers: [],
      blockedPosts: [],
      followList: FOLLOW_LIST.map(f => f.id)
    };
  }

  function loadState() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) {
        const parsed = JSON.parse(saved);
        if (parsed.posts) parsed.posts = stripResolvedFromPosts(parsed.posts);
        if (parsed.comments) parsed.comments = normalizeComments(parsed.comments);
        return { ...defaultState(), ...parsed, settings: { ...defaultState().settings, ...parsed.settings } };
      }
    } catch (e) { /* ignore */ }
    return defaultState();
  }

  function saveState() {
    state.blockedUsers = [...blockedUsers];
    state.blockedPosts = [...blockedPosts];
    state.posts = stripResolvedFromPosts(state.posts);
    state.comments = normalizeComments(state.comments);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    applyTheme();
  }

  function applyTheme() {
    document.documentElement.setAttribute('data-theme', state.settings.darkMode ? 'dark' : 'light');
    document.documentElement.setAttribute('data-font', state.settings.fontSize);
  }

  function toast(msg) {
    const el = document.createElement('div');
    el.className = 'toast';
    el.textContent = msg;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }

  function formatTime(iso) {
    const d = new Date(iso);
    const now = new Date();
    const diff = (now - d) / 1000;
    if (diff < 3600) return Math.floor(diff / 60) + '分钟前';
    if (diff < 86400) return Math.floor(diff / 3600) + '小时前';
    if (diff < 604800) return Math.floor(diff / 86400) + '天前';
    return d.toLocaleDateString('zh-CN');
  }

  function escapeHtml(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  /* ---- 模态框 ---- */
  function showModal(title, bodyHtml, onClose) {
    const container = document.getElementById('modalContainer');
    container.innerHTML = `
      <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
          <div class="modal-header">
            <h2>${title}</h2>
            <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
          </div>
          <div class="modal-body">${bodyHtml}</div>
        </div>
      </div>`;
    const overlay = document.getElementById('modalOverlay');
    const close = () => { container.innerHTML = ''; if (onClose) onClose(); };
    document.getElementById('modalClose').onclick = close;
    overlay.onclick = (e) => { if (e.target === overlay) close(); };
  }

  function closeModal() {
    document.getElementById('modalContainer').innerHTML = '';
  }

  /* ---- Tab 切换 ---- */
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.add('hidden'));
    document.getElementById('tab-' + tab).classList.remove('hidden');
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.tab === tab);
    });
    document.getElementById('fabPublish').classList.toggle('hidden', tab !== 'community');
    if (tab === 'community') renderPosts();
    if (tab === 'profile') renderProfile();
  }

  /* ---- 主页：板块网格 ---- */
  function renderSections() {
    const grid = document.getElementById('sectionGrid');
    grid.innerHTML = SECTIONS.map(s => `
      <div class="section-card" onclick="App.openSection('${s.id}')">
        <div class="section-icon" style="background:${s.color}">${s.icon}</div>
        <h3>${s.title}</h3>
        <p>${s.description}</p>
      </div>`).join('');
  }

  /* ---- 搜索 ---- */
  function doSearch(keyword) {
    const resultsEl = document.getElementById('searchResults');
    const gridEl = document.getElementById('sectionGrid');
    const banner = document.querySelector('.home-banner');
    const clearBtn = document.getElementById('clearSearch');

    if (!keyword.trim()) {
      resultsEl.classList.add('hidden');
      gridEl.classList.remove('hidden');
      banner.classList.remove('hidden');
      clearBtn.classList.add('hidden');
      return;
    }

    clearBtn.classList.remove('hidden');
    gridEl.classList.add('hidden');
    banner.classList.add('hidden');
    resultsEl.classList.remove('hidden');

    const kw = keyword.toLowerCase();
    const results = [];

    BASIC_ARTICLES.forEach(a => {
      const text = (a.title + a.steps.join('')).toLowerCase();
      if (text.includes(kw)) results.push({ ...a, matchType: '基础知识', desc: a.steps[0] });
    });
    CCNU_INFOS.forEach(c => {
      const text = (c.title + c.description + (c.address || '')).toLowerCase();
      if (text.includes(kw)) results.push({ ...c, matchType: '[校内]', desc: c.description });
    });
    EXPERIENCES.forEach(e => {
      const text = (e.title + e.summary).toLowerCase();
      if (text.includes(kw)) results.push({ ...e, matchType: '[经验]', desc: e.summary });
    });
    state.posts.forEach(p => {
      const text = (p.title + p.content).toLowerCase();
      if (text.includes(kw)) results.push({ id: p.id, type: 'post', title: p.title, sectionId: p.sectionId, matchType: '帖子', desc: p.content.slice(0, 60) });
    });
    SECTIONS.forEach(s => {
      if (s.title.includes(keyword) || s.description.includes(keyword)) {
        results.push({ id: s.id, type: 'section', title: s.title, matchType: '板块', desc: s.description });
      }
    });

    if (results.length === 0) {
      resultsEl.innerHTML = '<div class="empty-state"><i class="fas fa-search"></i><p>未找到相关内容</p></div>';
      return;
    }

    resultsEl.innerHTML = results.map(r => `
      <div class="result-item" onclick="App.handleSearchResult('${r.type || 'article'}','${r.id}','${r.sectionId || ''}','${r.postId || ''}')">
        <div class="result-type">${r.matchType}</div>
        <div class="result-title">${escapeHtml(r.title)}</div>
        <div class="result-desc">${escapeHtml(r.desc || '')}</div>
        ${r.sectionId ? `<div class="result-desc">${SECTION_MAP[r.sectionId]?.title || ''}</div>` : ''}
      </div>`).join('');
  }

  function handleSearchResult(type, id, sectionId, postId) {
    if (type === 'section') { openSection(id); return; }
    if (type === 'post') { switchTab('community'); showPostDetail(id); return; }
    if (type === 'experience') { showPostDetail(postId); return; }
    if (type === 'ccnu') {
      const item = CCNU_INFOS.find(c => c.id === id);
      if (item) showItemDetail(item);
      return;
    }
    const item = BASIC_ARTICLES.find(a => a.id === id);
    if (item) showItemDetail(item);
  }

  /* ---- 板块详情 ---- */
  function openSection(sectionId) {
    currentSection = sectionId;
    currentSectionTab = 'basic';
    document.getElementById('home-main').classList.add('hidden');
    document.getElementById('section-detail').classList.remove('hidden');
    document.getElementById('sectionDetailTitle').textContent = SECTION_MAP[sectionId].title;
    renderSectionTabs();
    renderSectionItems();
  }

  function goBackSection() {
    currentSection = null;
    document.getElementById('section-detail').classList.add('hidden');
    document.getElementById('home-main').classList.remove('hidden');
  }

  function renderSectionTabs() {
    const tabs = [
      { key: 'basic', label: '基础知识' },
      { key: 'ccnu', label: 'CCNU专属' },
      { key: 'experience', label: '经验分享' }
    ];
    document.getElementById('sectionSubTabs').innerHTML = tabs.map(t => `
      <div class="sub-tab ${currentSectionTab === t.key ? 'active' : ''}" onclick="App.setSectionTab('${t.key}')">${t.label}</div>
    `).join('');
  }

  function setSectionTab(key) {
    currentSectionTab = key;
    renderSectionTabs();
    renderSectionItems();
  }

  function renderSectionItems() {
    const list = document.getElementById('sectionItemList');
    let items = [];
    if (currentSectionTab === 'basic') {
      items = BASIC_ARTICLES.filter(a => a.sectionId === currentSection);
    } else if (currentSectionTab === 'ccnu') {
      items = CCNU_INFOS.filter(c => c.sectionId === currentSection);
    } else {
      items = EXPERIENCES.filter(e => e.sectionId === currentSection);
    }

    if (items.length === 0) {
      list.innerHTML = '<div class="empty-state"><i class="fas fa-inbox"></i><p>暂无内容</p></div>';
      return;
    }

    list.innerHTML = items.map(item => {
      let tag = '';
      if (item.type === 'ccnu') tag = '<span class="tag-campus">[校内]</span>';
      if (item.type === 'experience') tag = '<span class="tag-exp">[经验]</span>';

      let desc = '';
      if (item.steps) desc = item.steps.map((s, i) => `<div class="item-step">${i + 1}. ${escapeHtml(s)}</div>`).join('');
      else if (item.description) desc = `<div class="item-desc">${escapeHtml(item.description)}</div>`;
      else if (item.summary) desc = `<div class="item-desc">${escapeHtml(item.summary)}</div>`;

      return `<div class="item-card" onclick="App.onItemClick('${item.type || 'article'}','${item.id}','${item.postId || ''}')">
        <div class="item-title">${tag}${escapeHtml(item.title)}</div>${desc}
      </div>`;
    }).join('');
  }

  function onItemClick(type, id, postId) {
    if (type === 'experience') { showPostDetail(postId); return; }
    const item = type === 'ccnu'
      ? CCNU_INFOS.find(c => c.id === id)
      : BASIC_ARTICLES.find(a => a.id === id);
    if (item) showItemDetail(item);
  }

  function showItemDetail(item) {
    addHistory({ type: item.type || 'article', title: item.title, targetId: item.id, sectionId: item.sectionId });
    let body = '';
    if (item.steps) {
      body = '<h3 style="margin-bottom:12px;">操作步骤</h3>' +
        item.steps.map((s, i) => `<p><strong>${i + 1}.</strong> ${escapeHtml(s)}</p>`).join('') +
        (item.officialUrl ? `<p style="margin-top:12px;"><a href="${item.officialUrl}" target="_blank" style="color:var(--secondary);">🔗 ${item.officialName || '官方链接'}</a></p>` : '');
    } else {
      body = `<p>${escapeHtml(item.description || item.content || '')}</p>`;
      if (item.address) body += `<div class="info-row"><span class="info-label">地址</span><span>${escapeHtml(item.address)}</span></div>`;
      if (item.time) body += `<div class="info-row"><span class="info-label">时间</span><span>${escapeHtml(item.time)}</span></div>`;
      if (item.price) body += `<div class="info-row"><span class="info-label">价格</span><span>${escapeHtml(item.price)}</span></div>`;
      if (item.phone) body += `<div class="info-row"><span class="info-label">电话</span><span>${escapeHtml(item.phone)}</span></div>`;
    }
    showModal(item.title, body);
  }

  function addHistory(entry) {
    if (!state.settings.recordHistory) return;
    state.browseHistory.unshift({ ...entry, id: 'h_' + Date.now(), viewedAt: new Date().toISOString() });
    if (state.browseHistory.length > 50) state.browseHistory.length = 50;
    saveState();
  }

  /* ---- 社群 ---- */
  function renderTagFilter() {
    document.getElementById('tagFilter').innerHTML = PRESET_TAGS.map(t => `
      <div class="filter-tag ${currentTagFilter === t ? 'active' : ''}" onclick="App.setTagFilter('${t}')">${t}</div>
    `).join('');
  }

  function setTagFilter(tag) {
    currentTagFilter = tag;
    renderTagFilter();
    renderPosts();
  }

  function getVisiblePosts() {
    return state.posts.filter(p => {
      if (blockedPosts.has(p.id) || blockedUsers.has(p.authorId)) return false;
      if (currentTagFilter === '全部') return true;
      return p.tags.includes(currentTagFilter);
    });
  }

  function renderPosts() {
    const posts = getVisiblePosts();
    const list = document.getElementById('postList');
    if (posts.length === 0) {
      list.innerHTML = '<div class="empty-state"><i class="fas fa-comments"></i><p>暂无帖子</p></div>';
      return;
    }
    list.innerHTML = posts.map(p => {
      const liked = state.likedPosts.includes(p.id);
      const favorited = state.favorites.posts.includes(p.id);
      const useful = (p.usefulBy || []).includes(USER_ID);
      return `
      <div class="post-card" data-id="${p.id}">
        <div class="post-header">
          <span class="post-type ${p.type}">${POST_TYPE_LABELS[p.type]}</span>
          <button class="post-menu" onclick="App.showPostMenu('${p.id}')"><i class="fas fa-ellipsis-v"></i></button>
        </div>
        <div class="post-title" onclick="App.showPostDetail('${p.id}')">
          ${escapeHtml(p.title)}
        </div>
        <div class="post-content" onclick="App.showPostDetail('${p.id}')">${escapeHtml(p.content)}</div>
        <div class="post-tags">${p.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
        <div class="post-meta">
          <span>${escapeHtml(p.authorName)} · ${formatTime(p.createdAt)}</span>
          <span><i class="fas fa-comment"></i> ${p.commentCount} · <i class="fas fa-heart"></i> ${p.likeCount}</span>
        </div>
        <div class="post-actions">
          <button class="action-btn ${liked ? 'active' : ''}" onclick="App.toggleLike('${p.id}')"><i class="fas fa-heart"></i> ${p.likeCount}</button>
          <button class="action-btn" onclick="App.showPostDetail('${p.id}')"><i class="fas fa-comment"></i> ${p.commentCount}</button>
          <button class="action-btn ${favorited ? 'active' : ''}" onclick="App.toggleFavorite('${p.id}')"><i class="fas fa-star"></i> ${p.favoriteCount}</button>
          ${p.type === 'help' ? `<button class="action-btn ${useful ? 'active' : ''}" onclick="App.toggleUseful('${p.id}')"><i class="fas fa-thumbs-up"></i> 有用 ${p.usefulCount || 0}</button>` : ''}
        </div>
      </div>`;
    }).join('');
  }

  function toggleLike(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const idx = state.likedPosts.indexOf(postId);
    if (idx >= 0) { state.likedPosts.splice(idx, 1); post.likeCount--; toast('已取消点赞'); }
    else { state.likedPosts.push(postId); post.likeCount++; toast('点赞成功'); }
    saveState();
    renderPosts();
  }

  function toggleFavorite(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const idx = state.favorites.posts.indexOf(postId);
    if (idx >= 0) { state.favorites.posts.splice(idx, 1); post.favoriteCount--; toast('已取消收藏'); }
    else { state.favorites.posts.push(postId); post.favoriteCount++; toast('收藏成功'); }
    saveState();
    renderPosts();
  }

  function toggleUseful(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    if (!post.usefulBy) post.usefulBy = [];
    const idx = post.usefulBy.indexOf(USER_ID);
    if (idx >= 0) { post.usefulBy.splice(idx, 1); post.usefulCount--; toast('已取消标记'); }
    else { post.usefulBy.push(USER_ID); post.usefulCount++; toast('已标记为有用'); }
    saveState();
    renderPosts();
  }

  function showPostMenu(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    showModal('帖子管理', `
      <button class="btn-primary" style="margin-bottom:8px;" onclick="App.reportPost('${postId}')">举报帖子</button>
      <button class="btn-secondary" onclick="App.blockUser('${post.authorId}','${escapeHtml(post.authorName)}')">屏蔽用户 ${escapeHtml(post.authorName)}</button>
    `);
  }

  function reportPost(postId) {
    closeModal();
    const reasons = REPORT_REASONS.map(r =>
      `<button class="btn-secondary" style="margin-bottom:6px;" onclick="App.submitReport('${postId}','${r}')">${r}</button>`
    ).join('');
    showModal('举报原因', reasons);
  }

  function renderCommentHtml(comment, depth, postId) {
    const canReply = depth < 3;
    const indent = (depth - 1) * 20;
    let html = `
      <div class="comment-item" style="margin-left:${indent}px">
        <div class="comment-header-row">
          <span class="comment-author">${escapeHtml(comment.authorName)}</span>
          <span class="comment-time">${formatTime(comment.createdAt)}</span>
          ${canReply ? `<button type="button" class="comment-reply-btn" onclick="App.toggleReplyForm('${comment.id}')">回复</button>` : ''}
        </div>
        <div class="comment-text">${escapeHtml(comment.content)}</div>
        ${canReply ? `
        <div class="reply-form hidden" id="reply-form-${comment.id}">
          <input type="text" id="reply-name-${comment.id}" placeholder="你的姓名" value="${escapeHtml(state.nickname)}">
          <textarea id="reply-content-${comment.id}" placeholder="写下回复…"></textarea>
          <button type="button" onclick="App.submitReply('${postId}','${comment.id}')">提交</button>
        </div>` : ''}
      </div>`;
    comment.replies.forEach(child => { html += renderCommentHtml(child, depth + 1, postId); });
    return html;
  }

  function showPostDetail(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    addHistory({ type: 'post', title: post.title, targetId: postId, sectionId: post.sectionId });
    const flat = state.comments.filter(c => c.postId === postId);
    const tree = buildCommentTree(flat);
    const commentTotal = countAllComments(tree);
    const commentsHtml = tree.length
      ? tree.map(c => renderCommentHtml(c, 1, postId)).join('')
      : '<p style="color:var(--text-secondary);font-size:0.85rem;">暂无评论</p>';

    showModal(post.title, `
      <div style="margin-bottom:12px;">
        <span class="post-type ${post.type}">${POST_TYPE_LABELS[post.type]}</span>
      </div>
      <p style="line-height:1.7;margin-bottom:12px;">${escapeHtml(post.content)}</p>
      <div class="post-tags" style="margin-bottom:12px;">${post.tags.map(t => `<span class="post-tag">${t}</span>`).join('')}</div>
      <p style="font-size:0.8rem;color:var(--text-secondary);margin-bottom:16px;">${escapeHtml(post.authorName)} · ${formatTime(post.createdAt)}</p>
      <h3 style="margin-bottom:8px;font-size:0.95rem;">评论 (${commentTotal})</h3>
      ${commentsHtml}
      <div class="comment-input-row">
        <input type="text" id="commentInput" placeholder="写下你的评论…">
        <button onclick="App.submitComment('${postId}')">发送</button>
      </div>
    `);
  }

  function toggleReplyForm(commentId) {

  function submitReply(postId, parentId) {
    const nameEl = document.getElementById('reply-name-' + parentId);
    const contentEl = document.getElementById('reply-content-' + parentId);
    const authorName = nameEl?.value?.trim();
    const content = contentEl?.value?.trim();
    if (!authorName || !content) { toast('姓名和内容不能为空'); return; }
    const flat = state.comments.filter(c => c.postId === postId);
    if (getCommentDepth(flat, parentId) >= 3) { toast('已达最大回复层级'); return; }
    state.comments.push({
      id: 'c_' + Date.now(), postId, parentId, authorId: USER_ID, authorName,
      content, createdAt: new Date().toISOString()
    });
    const post = state.posts.find(p => p.id === postId);
    if (post) post.commentCount++;
    saveState();
    toast('回复成功');
    closeModal();
    showPostDetail(postId);
  }

  function submitComment(postId) {
    const input = document.getElementById('commentInput');
    const content = input?.value?.trim();
    if (!content) { toast('请输入评论内容'); return; }
    state.comments.push({
      id: 'c_' + Date.now(), postId, parentId: null, authorId: USER_ID, authorName: state.nickname,
      content, createdAt: new Date().toISOString()
    });
    const post = state.posts.find(p => p.id === postId);
    if (post) post.commentCount++;
    saveState();
    toast('评论成功');
    closeModal();
    showPostDetail(postId);
  }

  function submitPost() {
    const type = document.getElementById('pubType').value;
    const title = document.getElementById('pubTitle').value.trim();
    const content = document.getElementById('pubContent').value.trim();
    const tags = [...document.querySelectorAll('#pubTags .tag-option.selected')].map(el => el.dataset.tag);
    if (!title || !content) { toast('请填写标题和内容'); return; }
    if (tags.length === 0) { toast('请至少选择一个标签'); return; }

    const newPost = {
      id: 'post_' + Date.now(), type, sectionId: 'life', title, content,
      images: [], tags, authorId: USER_ID, authorName: state.nickname,
      createdAt: new Date().toISOString(),
      likeCount: 0, commentCount: 0, favoriteCount: 0, usefulCount: 0,
      usefulBy: []
    };
    state.posts.unshift(newPost);
    state.myPosts.unshift(newPost.id);
    saveState();
    closeModal();
    toast('发布成功！');
    renderPosts();
  }

    const idx = state.followList.indexOf(userId);
    if (idx >= 0) { state.followList.splice(idx, 1); btn.classList.remove('on'); toast('已取消关注'); }
    else { state.followList.push(userId); btn.classList.add('on'); toast('关注成功'); }
    saveState();
  }

  function readNotification(id) {
    const n = state.notifications.find(n => n.id === id);
    if (n) { n.read = true; saveState(); renderProfile(); renderSubContent('notifications'); }
  }

  function toggleSetting(key, btn) {
    state.settings[key] = !state.settings[key];
    btn.classList.toggle('on', state.settings[key]);
    saveState();
    if (key === 'darkMode') toast(state.settings.darkMode ? '已开启深色模式' : '已关闭深色模式');
  }

  function setFontSize(size) {
    state.settings.fontSize = size;
    saveState();
    toast('字体大小已更新');
  }

  function setPrivacy(key, value) {
    state.settings[key] = value;
    saveState();
    toast('设置已保存');
  }

  function changePassword() {
    const pwd = prompt('请输入新密码（演示）');
    if (pwd) toast('密码修改成功');
  }

  function bindPhone() {
    const phone = prompt('请输入手机号');
    if (phone) toast('手机绑定成功：' + phone);
  }

  function logout() {
    if (confirm('确定退出登录？')) toast('已退出登录（演示）');
  }

  function contactSupport() {
    showModal('客服咨询', '<p>请发送邮件至 <strong>support@pigmom.ccnu.edu.cn</strong></p><p style="margin-top:8px;color:var(--text-secondary);font-size:0.85rem;">工作时间：周一至周五 9:00-17:00</p>');
  }

  function reportIssue() {
    const issue = prompt('请描述您遇到的问题');
    if (issue) toast('问题已上报，感谢反馈');
  }

  function showAgreement() {
    showModal('用户协议', `<div class="text-content">${escapeHtml(USER_AGREEMENT)}</div>`);
  }

  function showPrivacy() {
    showModal('隐私政策', `<div class="text-content">${escapeHtml(PRIVACY_POLICY)}</div>`);
  }

  /* ---- 初始化 ---- */
  function init() {
    applyTheme();
    renderSections();
    renderTagFilter();
    renderPosts();
    renderProfile();

    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => switchTab(btn.dataset.tab));
    });

    const searchInput = document.getElementById('searchInput');
    searchInput.addEventListener('input', (e) => doSearch(e.target.value));
    document.getElementById('clearSearch').addEventListener('click', () => {
      searchInput.value = '';
      doSearch('');
    });

    document.getElementById('fabPublish').addEventListener('click', () => showPublishForm());

    // 长按帖子举报
    document.getElementById('postList').addEventListener('contextmenu', (e) => {
      const card = e.target.closest('.post-card');
      if (card) { e.preventDefault(); showPostMenu(card.dataset.id); }
    });
  }

  document.addEventListener('DOMContentLoaded', init);

  return {
    openSection, goBackSection, setSectionTab, onItemClick, handleSearchResult,
    setTagFilter, showPostDetail, toggleLike, toggleFavorite, toggleUseful,
    toggleReplyForm, submitReply,
    showPostMenu, reportPost, submitReport, blockUser, submitComment,
    showPublishForm, previewImages, submitPost, saveDraft,
    openProfileSub, backProfile, editNickname, editDraft, toggleFollow,
    readNotification, toggleSetting, setFontSize, setPrivacy,
    changePassword, bindPhone, logout, contactSupport, reportIssue,
    showAgreement, showPrivacy
  };
})();
</script>
</body>
</html>
